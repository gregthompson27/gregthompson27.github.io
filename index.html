<!DOCTYPE HTML>
<html>
    <head>
        <title>Milo's Magnificent Website</title>
        <style>
            body {
                background: #3460a1;
                color: #f7f4f4;
                padding: 10px;
                font-family: arial;
            }
            #all-contents {
                max-width: 800px;

            }

            /* navv menu */
            nav {

                padding: 0 10px;
            }

                text-decoration: none;
                color: #f7f4f4;
            }

            /* mainn container area beneath menu */
            main {
                background: #65abca;
                display: flex;
                color: #f7f4f4;
                border-radius: 5px;
                box-shadow: 3px 3px 8px #8888cc;
            }
            .sidebar {
                margin-right: 25px;
                padding: 10px;

            .sidebar-img {

                border-radius: 25px;
                border: 3px solid #aba24a;

            .content {
                flex: 1;
                padding: 15px;
            }
            #interests {
                border: 4px #ae4eae ridge;
                padding: 8px;
            }

                margin: 0px;
            }

                <!-- Content section -->
                <div class="content">

                    <div id="interests">
